name: AdminChat
options:
  bundleIdPrefix: com.cursorrevitmcp
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  groupSortPosition: top
  usesTabs: false

settings:
  SWIFT_VERSION: "5.0"

targets:
  AdminChat:
    type: application
    platform: iOS
    sources:
      - path: AdminChat
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.cursorrevitmcp.adminchat
      PRODUCT_NAME: AdminChat
      TARGETED_DEVICE_FAMILY: "1"
      INFOPLIST_FILE: AdminChat/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "0.1.0"
      ENABLE_USER_SCRIPT_SANDBOXING: NO

schemes:
  AdminChat:
    build:
      targets:
        AdminChat: all
